version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cpn_app
    ports:
      - "8000:80"
    environment:
      APP_NAME: CPN
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: cpn
      DB_USERNAME: cpn_user
      DB_PASSWORD: cpn_password
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/html/storage
    restart: unless-stopped

  mysql:
    image: mariadb:10.4
    container_name: cpn_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cpn
      MYSQL_USER: cpn_user
      MYSQL_PASSWORD: cpn_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./cpn.sql:/docker-entrypoint-initdb.d/cpn.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
  storage_data:
