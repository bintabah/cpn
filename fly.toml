app = "cpn-conakry-2024"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV   = "production"
  APP_DEBUG = "false"
  LOG_CHANNEL = "stderr"
  DB_CONNECTION = "pgsql"
  DB_PORT       = "5432"
  CACHE_DRIVER    = "file"
  SESSION_DRIVER  = "file"
  QUEUE_CONNECTION = "sync"

[http_service]
  internal_port       = 80
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/login"
    port         = 80
    timeout      = "5s"
    type         = "http"
